<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Menu Utama - Magical Moment</title>
    <style>
        :root { --gold: #d4af37; --dark: #000; --white: #fff; }

        body { 
            background: var(--dark); 
            color: var(--white); 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            margin: 0; 
            text-align: center;
            padding: 40px 20px;
        }

        .logo-small { width: 120px; margin-bottom: 30px; }

        /* Gaya Sapaan Klien */
        .welcome-box { margin-bottom: 50px; }
        .welcome-box h1 { font-size: 1.8em; margin: 0; font-weight: 300; }
        .welcome-box .client-name { color: var(--gold); font-weight: bold; display: block; font-size: 1.2em; margin-top: 5px; }

        /* Container Tombol */
        .menu-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 350px;
            margin: 0 auto;
        }

        .btn-menu {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            padding: 22px;
            border-radius: 18px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1em;
            transition: 0.3s;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        /* Gaya Tombol Price List */
        .btn-price {
            background: rgba(212, 175, 55, 0.1);
            color: var(--gold);
        }

        /* Gaya Tombol Booking */
        .btn-booking {
            background: var(--gold);
            color: #000;
            border: none;
        }

        .btn-menu:active { transform: scale(0.96); }

        .tagline {
            margin-top: 60px;
            font-size: 13px;
            color: #666;
            font-style: italic;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <img src="LOGO.jpg" alt="Magical Moment" class="logo-small">

    <div class="welcome-box">
        <h1>Halo, Selamat Datang</h1>
        <span id="displayNama" class="client-name">Kak...</span>
    </div>

    <div class="menu-grid">
    <a href="daftar lebaran.html" class="btn-menu" style="background: linear-gradient(145deg, #d4af37, #b8860b); color: #000; border: none; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);">
        <span>🌙</span> BOOKING FOTO LEBARAN
    </a>

    <a href="pricelist.html" target="_blank" class="btn-menu btn-price">
        <span>📖</span> LIHAT PRICE LIST
    </a>

    <a href="index.html" class="btn-menu btn-booking">
        <span>📅</span> BOOKING JADWAL
    </a>
</div>
    <p class="tagline">
        “Momen kamu nggak akan terulang, <br>
        biarkan kami yang mengabadikannya secara Magical.”
    </p>

    <script>
        // Ambil data nama yang tadi disimpen di login.html
        const namaKlien = sessionStorage.getItem('namaUser');

        // Kalau ada namanya, tampilin. Kalau gak ada, tendang balik ke login.
        if (namaKlien) {
            document.getElementById('displayNama').innerText = namaKlien;
        } else {
            window.location.href = 'login.html';
        }
    </script>

</body>
</html>
